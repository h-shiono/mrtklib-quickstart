project:
  type: website
  output-dir: _site

# ---------------------------------------------------------------------------
#  mrtklib-quickstart documentation
#  Generate HTML (website) and PDF from a single Quarto source.
#  Bilingual (en/ ja/). Body text is primarily OS-independent; OS-specific
#  content is contained within each section.
# ---------------------------------------------------------------------------

website:
  title: "mrtklib-quickstart"
  favicon: assets/img/favicon.png
  navbar:
    # A runtime language switcher is injected into the right side by
    # assets/lang-switch.html (see format.html.include-after-body).
    right:
      - icon: github
        href: https://github.com/h-shiono/mrtklib-quickstart
  sidebar:
    - id: en
      title: "English"
      contents:
        - en/00-overview.qmd
        - en/10-concepts.qmd
        - en/20-install-windows.qmd
        - en/21-install-macos.qmd
        - en/22-install-linux.qmd
        - en/30-run-windows.qmd
        - en/31-run-macos.qmd
        - en/32-run-linux.qmd
        - en/50-using-ui.qmd
        - en/60-stop-windows.qmd
        - en/80-appendix-receiver-setup.qmd
        - en/90-troubleshooting.qmd
    - id: ja
      title: "日本語"
      contents:
        - ja/00-overview.qmd
        - ja/10-concepts.qmd
        - ja/20-install-windows.qmd
        - ja/21-install-macos.qmd
        - ja/22-install-linux.qmd
        - ja/30-run-windows.qmd
        - ja/31-run-macos.qmd
        - ja/32-run-linux.qmd
        - ja/50-using-ui.qmd
        - ja/60-stop-windows.qmd
        - ja/80-appendix-receiver-setup.qmd
        - ja/90-troubleshooting.qmd

format:
  html:
    theme:
      - cosmo
      - assets/theme.scss
    toc: true
    number-sections: true
    # Loads the web fonts used by the refined theme (HTML only).
    include-in-header: assets/head.html
    # Injects the navbar language switcher (HTML only).
    include-after-body: assets/lang-switch.html
  pdf:
    documentclass: scrreprt
    toc: true
    number-sections: true
    # Engine for Japanese PDF. The CI must provide a TeX environment.
    pdf-engine: lualatex

lang: en
